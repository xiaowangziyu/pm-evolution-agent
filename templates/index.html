<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 产品经理进化论 - 今日学习</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/" class="navbar-brand">
        <div class="logo">🚀</div>
        <span>产品经理进化论</span>
      </a>
      <ul class="navbar-nav">
        <li><a href="/" class="active">今日学习</a></li>
        <li><a href="/progress">技能进度</a></li>
        <li><a href="/history">学习历史</a></li>
      </ul>
    </div>
  </nav>

  <div class="main-container">
    <div class="hero">
      <h1>每天进步一点点，<span>知行合一创不凡</span></h1>
      <p>AI驱动的个性化学习系统，帮你系统掌握产品经理核心能力</p>
    </div>

    <div class="steps" id="steps">
      <div class="step-item active" data-step="1">
        <div class="step-num">1</div>
        <div class="step-label">知识点</div>
      </div>
      <div class="step-line"></div>
      <div class="step-item" data-step="2">
        <div class="step-num">2</div>
        <div class="step-label">练习题</div>
      </div>
      <div class="step-line"></div>
      <div class="step-item" data-step="3">
        <div class="step-num">3</div>
        <div class="step-label">AI评估</div>
      </div>
      <div class="step-line"></div>
      <div class="step-item" data-step="4">
        <div class="step-num">4</div>
        <div class="step-label">学习日记</div>
      </div>
    </div>

    <div id="main-content">
      <div class="card" style="text-align: center;">
        <div class="loading" style="justify-content: center;">
          <div class="spinner"></div>
          <span>正在为你准备今日学习内容...</span>
        </div>
      </div>
    </div>

    <div class="footer">
      产品经理进化论 · AI驱动的个性化学习系统
    </div>
  </div>

  <script src="/static/js/main.js"></script>
</body>
</html>
